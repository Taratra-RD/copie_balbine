#!KAMAILIO

####### Global Parameters #########
debug=3
log_stderror=no
log_facility=LOG_LOCAL0
fork=yes
children=4

# SIP listen
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

####### Modules Section ########
# core
mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

loadmodule "kemi.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "acc.so"
loadmodule "counters.so"

# RTP Engine
loadmodule "rtpengine.so"

####### Routing Logic ########
# Kamailio Embedded Interface (KEMI) - simple Python-like DSL
request_route {
    # Sanity checks
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }

    if (has_totag()) return;

    # Handle REGISTER (3CX trunk)
    if (is_method("REGISTER")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # Handle INVITE from 3CX -> forward to Node via RTP Engine
    if (is_method("INVITE")) {
        xlog("L_INFO", "INVITE from $fu to $ru\n");
        # Offer RTP to RTP Engine (port 5000 for Node AudioSocket)
        rtpengine_manage("replace-origin replace-session-connection");
        sl_send_reply("200", "OK");
        exit;
    }

    # ACK
    if (is_method("ACK")) {
        rtpengine_manage();
        exit;
    }

    # BYE
    if (is_method("BYE")) {
        rtpengine_delete();
        sl_send_reply("200", "OK");
        exit;
    }

    # Default response
    sl_send_reply("404", "Not Found");
    exit;
}
